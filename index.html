    <title>Felix Martin Birame Ndong — STAR ENERGY</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { color-scheme: light only; -webkit-color-scheme: light; forced-color-adjust: none; }
        @media (prefers-color-scheme: dark) {
            /* Verrouillage explicite en cas d'override systeme */
            html, body { background-color: #F4F7E8; color: #2D1B4E; }
        }

        :root {
            --purple-deep: #4A2D6B;
            --purple: #5D3A82;
            --purple-light: #8B6BA8;
            --coral: #E54B3C;
            --coral-light: #FF6F5C;
            --green-bg: #C5E1A5;
            --green-soft: #DCEAB8;
            --cream: #FAF8F2;
            --white: #FFFFFF;
            --text: #2D1B4E;
            --text-soft: #5A4373;
            --shadow: 0 20px 60px rgba(74, 45, 107, 0.18);
            --shadow-soft: 0 8px 30px rgba(74, 45, 107, 0.12);
        }

        html, body { overscroll-behavior: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background:
                radial-gradient(ellipse at top left, #DCEAB8 0%, transparent 55%),
                radial-gradient(ellipse at bottom right, #E8D5F0 0%, transparent 55%),
                linear-gradient(135deg, #F4F7E8 0%, #FAF8F2 50%, #F0E8F5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(120deg, transparent 49.5%, rgba(229, 75, 60, 0.04) 49.5%, rgba(229, 75, 60, 0.04) 50.5%, transparent 50.5%),
                linear-gradient(60deg, transparent 49.5%, rgba(93, 58, 130, 0.04) 49.5%, rgba(93, 58, 130, 0.04) 50.5%, transparent 50.5%);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 10%; right: 5%;
            width: 80px; height: 80px;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: sparkle 4s ease-in-out infinite;
        }
        @keyframes sparkle { 0%,100%{opacity:.5;transform:scale(1);} 50%{opacity:1;transform:scale(1.2);} }

        .card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 22px 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: cardEnter 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardEnter { 0%{opacity:0;transform:translateY(40px) scale(0.96);} 100%{opacity:1;transform:translateY(0) scale(1);} }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 22px;
            border-bottom: 1px dashed rgba(93, 58, 130, 0.15);
        }

        .lang-toggle { display:flex; justify-content:flex-end; position:relative; z-index:5; }
        .lang-pill { display:inline-flex; background:rgba(93,58,130,0.08); border-radius:999px; padding:4px; gap:2px; }
        .lang-btn { border:none; background:transparent; color:var(--text-soft); font-weight:600; font-size:12px; letter-spacing:.5px; padding:6px 14px; border-radius:999px; cursor:pointer; transition:all .25s ease; display:flex; align-items:center; gap:6px; }
        .lang-btn.active { background:linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%); color:white; box-shadow:0 4px 12px rgba(93,58,130,0.3); }
        .flag { width:14px; height:10px; border-radius:2px; overflow:hidden; display:inline-block; box-shadow:0 1px 2px rgba(0,0,0,0.15); }

        .logo-wrap {
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            flex-shrink: 0;
        }
        .logo-wrap::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: radial-gradient(circle, rgba(229, 75, 60, 0.22) 0%, transparent 65%);
            animation: pulse 3.5s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes pulse { 0%,100%{opacity:.5;transform:scale(.92);} 50%{opacity:.9;transform:scale(1.04);} }
        .logo-wrap img {
            width: 100%; height: auto;
            position: relative; z-index: 1;
            filter: drop-shadow(0 8px 14px rgba(74, 45, 107, 0.28));
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-4px) rotate(-1deg);} }

        .identity {
            text-align: center;
            margin-bottom: 20px;
            animation: slideUp 0.8s ease-out 0.2s both;
        }
        .name { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; line-height: 1.15; }
        .role {
            margin-top: 6px;
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: var(--purple);
            background: linear-gradient(135deg, rgba(93, 58, 130, 0.08) 0%, rgba(229, 75, 60, 0.08) 100%);
            padding: 5px 12px;
            border-radius: 999px;
            letter-spacing: 0.3px;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(15px);} to{opacity:1;transform:translateY(0);} }

        .address {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            border: 1px solid rgba(93, 58, 130, 0.08);
            text-decoration: none;
            color: var(--text);
            margin-bottom: 18px;
            transition: all .25s ease;
            animation: slideUp 0.8s ease-out 0.35s both;
        }
        .address:active { transform: scale(0.98); }
        .address:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); border-color: rgba(93,58,130,0.2); }
        .address-icon {
            width: 34px; height: 34px;
            flex-shrink: 0;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--coral) 0%, #C73E2F 100%);
            color: white;
        }
        .address-icon svg { width: 16px; height: 16px; }
        .address-body { flex: 1; min-width: 0; }
        .address-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); font-weight: 600; }
        .address-value { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 1px; line-height: 1.25; }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(93, 58, 130, 0.08);
            animation: slideUp 0.8s ease-out 0.5s both;
        }
        #qrcode { padding: 10px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(74, 45, 107, 0.1); display: flex; align-items: center; justify-content: center; }
        #qrcode img, #qrcode canvas { display: block; border-radius: 4px; }
        .qr-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--purple); font-weight: 700; text-align: center; }
        .qr-sub { font-size: 10px; color: var(--text-soft); text-align: center; margin-top: -2px; }

        .actions { display: flex; flex-direction: column; gap: 10px; animation: slideUp 0.8s ease-out 0.65s both; }
        .btn { border: none; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; padding: 14px 18px; border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all .25s ease; position: relative; overflow: hidden; }
        .btn:active { transform: scale(0.97); }
        .btn svg { width: 18px; height: 18px; }
        .btn-coral { background: linear-gradient(135deg, var(--coral) 0%, #C73E2F 100%); color: white; box-shadow: 0 8px 20px rgba(229, 75, 60, 0.3); }
        .btn-coral:hover { box-shadow: 0 12px 28px rgba(229, 75, 60, 0.4); transform: translateY(-2px); }

        /* Share sheet */
        .share-sheet { position: fixed; inset: 0; background: rgba(45, 27, 78, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 100; opacity: 0; transition: opacity .3s ease; }
        .share-sheet.open { display: flex; opacity: 1; }
        .share-panel { width: 100%; max-width: 460px; background: white; border-radius: 28px 28px 0 0; padding: 20px 20px 28px; transform: translateY(100%); transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .share-sheet.open .share-panel { transform: translateY(0); }
        .share-handle { width: 40px; height: 4px; background: rgba(93, 58, 130, 0.2); border-radius: 2px; margin: 0 auto 16px; }
        .share-title { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 6px; }
        .share-sub { font-size: 13px; color: var(--text-soft); text-align: center; margin-bottom: 20px; }
        .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
        .share-opt { display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; padding: 8px 4px; border-radius: 14px; transition: background .2s ease; }
        .share-opt:hover { background: rgba(93, 58, 130, 0.05); }
        .share-opt:active { transform: scale(0.95); }
        .share-opt-icon { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 6px 14px rgba(0,0,0,0.12); }
        .share-opt-icon svg { width: 24px; height: 24px; }
        .share-opt-icon.wa { background: linear-gradient(135deg, #25D366, #128C7E); }
        .share-opt-icon.sms { background: linear-gradient(135deg, #34B7F1, #007AFF); }
        .share-opt-icon.mail { background: linear-gradient(135deg, #FF6F5C, #E54B3C); }
        .share-opt-icon.more { background: linear-gradient(135deg, var(--purple-light), var(--purple)); }
        .share-opt-icon.copy { background: linear-gradient(135deg, #6C7A89, #4A5664); }
        .share-opt-icon.fb { background: linear-gradient(135deg, #4267B2, #1877F2); }
        .share-opt-icon.tg { background: linear-gradient(135deg, #2AABEE, #229ED9); }
        .share-opt-icon.li { background: linear-gradient(135deg, #0A66C2, #004182); }
        .share-opt-label { font-size: 11px; font-weight: 600; color: var(--text); }
        .share-close { width: 100%; background: rgba(93, 58, 130, 0.08); border: none; color: var(--purple-deep); font-weight: 700; font-size: 14px; padding: 12px; border-radius: 14px; cursor: pointer; margin-top: 8px; }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 12px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 200; opacity: 0; transition: all .35s ease; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .footer { text-align: center; margin-top: 22px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); opacity: 0.7; }

        @media (max-height: 760px) {
            .logo-wrap { width: 80px; height: 80px; }
            .topbar { margin-bottom: 12px; padding-bottom: 12px; }
            .identity { margin-bottom: 10px; }
            .address { margin-bottom: 10px; }
            .qr-section { margin-bottom: 10px; padding: 10px; }
            .name { font-size: 19px; }
            .card { padding: 14px 18px 16px; }
        }
        @media (max-width: 380px) {
            body { padding: 8px; }
            .card { padding: 14px 16px 16px; }
            .name { font-size: 18px; }
            .logo-wrap { width: 78px; height: 78px; }
            .share-opt-icon { width: 46px; height: 46px; }
        }
        @media (max-width: 340px) {
            .logo-wrap { width: 70px; height: 70px; }
            .name { font-size: 17px; }
            .lang-btn { font-size: 11px; padding: 5px 10px; }
        }
    </style>
</head>

                </button>
                <button class="share-opt" data-share="native">
                    <div class="share-opt-icon more"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg></div>
                    <span class="share-opt-label" data-i18n="more">Plus</span>
                </button>
            </div>
            <button class="share-close" id="closeShare" data-i18n="close">Fermer</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const i18n = {
            fr: {
                role: "Directeur Commercial",
                address: "Adresse",
                qrLabel: "Scannez pour mes coordonnées",
                qrSub: "Enregistrez le contact en un clic",
                share: "Partager ma carte",
                shareTitle: "Partager ma carte",
                shareSub: "Choisissez comment partager",
                copyLink: "Copier lien",
                more: "Plus",
                close: "Fermer",
                shareMsg: "Découvrez la carte de visite digitale de Felix Martin Birame Ndong, Directeur Commercial chez STAR ENERGY",
                emailSubject: "Carte de visite — Felix Martin Birame Ndong",
                copied: "Lien copié ✓",
                pageTitle: "Felix Martin Birame Ndong — STAR ENERGY"
            },
            en: {
                role: "Commercial Director",
                address: "Address",
                qrLabel: "Scan for my contact details",
                qrSub: "Save the contact in one tap",
                share: "Share my card",
                shareTitle: "Share my card",
                shareSub: "Choose how to share",
                copyLink: "Copy link",
                more: "More",
                close: "Close",
                shareMsg: "Discover the digital business card of Felix Martin Birame Ndong, Commercial Director at STAR ENERGY",
                emailSubject: "Business card — Felix Martin Birame Ndong",
                copied: "Link copied ✓",
                pageTitle: "Felix Martin Birame Ndong — STAR ENERGY"
            }
        };

        let currentLang = (localStorage.getItem('lang') || (navigator.language || 'fr').slice(0,2));
        if (!i18n[currentLang]) currentLang = 'fr';

        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.title = i18n[lang].pageTitle;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(b => {
                const isActive = b.dataset.lang === lang;
                b.classList.toggle('active', isActive);
                b.setAttribute('aria-selected', isActive);
            });
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            history.replaceState(null, '', url);
        }
        const urlLang = new URLSearchParams(window.location.search).get('lang');
        if (urlLang && i18n[urlLang]) currentLang = urlLang;
        applyLang(currentLang);
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.addEventListener('click', () => applyLang(b.dataset.lang));
        });

        // QR code -> scan.html (avec la langue active)
        const scanURL = new URL('scan.html', window.location.href);
        scanURL.searchParams.set('lang', currentLang);
        new QRCode(document.getElementById("qrcode"), {
            text: scanURL.toString(),
            width: 130,
            height: 130,
            colorDark: "#4A2D6B",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        // Regénère le QR quand on change de langue
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.addEventListener('click', () => {
                const u = new URL('scan.html', window.location.href);
                u.searchParams.set('lang', currentLang);
                const qrEl = document.getElementById('qrcode');
                qrEl.innerHTML = '';
                new QRCode(qrEl, { text: u.toString(), width: 130, height: 130, colorDark: "#4A2D6B", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
            });
        });

        // Toast
        const toast = document.getElementById('toast');
        let toastTimer;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // Share sheet
        const sheet = document.getElementById('shareSheet');
        const openSheet = () => { sheet.classList.add('open'); document.body.style.overflow = 'hidden'; };
        const closeSheet = () => { sheet.classList.remove('open'); document.body.style.overflow = ''; };
        document.getElementById('shareBtn').addEventListener('click', openSheet);
        document.getElementById('closeShare').addEventListener('click', closeSheet);
        sheet.addEventListener('click', e => { if (e.target === sheet) closeSheet(); });

        function shareData() {
            const t = i18n[currentLang];
            // On partage scan.html pour que le destinataire voie directement les coordonnees
            const scanShareURL = new URL('scan.html', window.location.href);
            scanShareURL.searchParams.set('lang', currentLang);
            return { msg: t.shareMsg, subject: t.emailSubject, url: scanShareURL.toString() };
        }

        document.querySelectorAll('.share-opt').forEach(b => {
            b.addEventListener('click', async () => {
                const { msg, subject, url } = shareData();
                const action = b.dataset.share;
                const fullText = msg + ' — ' + url;
                if (action === 'whatsapp') { window.open('https://wa.me/?text=' + encodeURIComponent(fullText), '_blank'); }
                else if (action === 'sms') { window.location.href = 'sms:?&body=' + encodeURIComponent(fullText); }
                else if (action === 'email') { window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(msg + '\n\n' + url); }
                else if (action === 'telegram') { window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(msg), '_blank'); }
                else if (action === 'facebook') { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url), '_blank'); }
                else if (action === 'linkedin') { window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url), '_blank'); }
                else if (action === 'copy') {
                    try { await navigator.clipboard.writeText(url); showToast(i18n[currentLang].copied); }
                    catch {
                        const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta);
                        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                        showToast(i18n[currentLang].copied);
                    }
                } else if (action === 'native') {
                    if (navigator.share) { try { await navigator.share({ title: 'STAR ENERGY', text: msg, url }); } catch {} }
                    else { showToast(currentLang === 'fr' ? 'Partage non disponible' : 'Share not available'); }
                }
                closeSheet();
            });
        });
    </script>
</body>
</html>
